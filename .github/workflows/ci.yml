name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      # Runs `prisma generate` via the package's postinstall hook.
      - name: Install dependencies
        run: npm ci

      - name: Lint & typecheck
        run: npm run check
        env:
          # Lint/typecheck don't run the app, so skip env validation rather than
          # feed dummy secrets. (`next lint` loads next.config, which imports env.js.)
          SKIP_ENV_VALIDATION: "1"

      - name: Build
        run: npm run build
        env:
          # Dummy values just to satisfy env validation during the build; no
          # database is contacted at build time.
          DATABASE_URL: "file:./prisma/db.sqlite"
          SESSION_SECRET: "ci-build-session-secret-min-32-characters-long"

      # The Vitest config injects its own NODE_ENV / DATABASE_URL / SESSION_SECRET
      # and the global setup runs `prisma db push` against a disposable SQLite DB.
      - name: Run tests
        run: npm test
